<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shine on Stage — Running Order Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0b0a; --panel:#171512; --panel-2:#1f1c17; --border:#352f26;
  --gold:#d9a94e; --gold-bright:#f0c573; --text:#f2ede2; --dim:#a89e8d;
  --warn:#e2574c; --warn-bg:rgba(226,87,76,0.14); --spot:#7fb6c0; --interval:#a392c4;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
.wrap{max-width:740px;margin:0 auto;padding:28px 20px 80px;}
.eyebrow{font-family:'Oswald',sans-serif;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);font-size:12px;font-weight:600;}
h1{font-family:'Oswald',sans-serif;letter-spacing:0.01em;font-size:28px;font-weight:600;margin:4px 0 18px;color:var(--text);}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:16px;}
label{font-size:12.5px;color:var(--dim);display:block;margin-bottom:5px;}
input[type=text],input[type=number],textarea{
  width:100%;background:var(--panel-2);border:1px solid var(--border);color:var(--text);
  border-radius:7px;padding:8px 10px;font-size:14px;font-family:inherit;
}
input:focus,textarea:focus,button:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
textarea{min-height:110px;resize:vertical;font-family:ui-monospace,Consolas,monospace;font-size:12.5px;}
.row{display:flex;gap:14px;flex-wrap:wrap;}
.row > div{flex:1;min-width:140px;}
button{
  font-family:'Oswald',sans-serif;letter-spacing:0.04em;text-transform:uppercase;font-size:12.5px;font-weight:600;
  background:var(--gold);color:#1a1408;border:none;border-radius:7px;padding:10px 16px;cursor:pointer;
}
button.ghost{background:transparent;color:var(--gold);border:1px solid var(--border);}
button.small{padding:6px 11px;font-size:11px;}
button:disabled{opacity:0.4;cursor:not-allowed;}
.toggle{display:flex;align-items:center;gap:9px;cursor:pointer;}
.toggle input{width:auto;}
.muted{color:var(--dim);font-size:13px;}
.linklike{background:none;border:none;color:var(--gold);text-decoration:underline;cursor:pointer;font-family:inherit;font-size:13px;text-transform:none;letter-spacing:0;padding:0;}
.totals{display:flex;gap:22px;align-items:baseline;flex-wrap:wrap;margin-top:6px;}
.totals .big{font-family:'Oswald',sans-serif;font-size:26px;color:var(--gold-bright);font-weight:600;}
.totals .sub{font-size:12.5px;color:var(--dim);}
.issues{background:var(--warn-bg);border:1px solid rgba(226,87,76,0.4);border-radius:10px;padding:14px 18px;margin-bottom:16px;}
.issues h3{margin:0 0 8px;font-size:13px;color:var(--warn);font-family:'Oswald',sans-serif;letter-spacing:0.04em;text-transform:uppercase;}
.issues li{font-size:13px;margin-bottom:4px;color:#f1cfca;}
#orderList{display:flex;flex-direction:column;gap:8px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:11px 14px;display:flex;align-items:center;gap:12px;}
.card.dragging{opacity:0.35;}
.card.interval{border-style:dashed;border-color:var(--interval);background:rgba(163,146,196,0.08);}
.card.closing{border-color:var(--gold);background:rgba(217,169,78,0.08);}
.drag-handle{cursor:grab;color:var(--dim);font-size:16px;line-height:1;touch-action:none;padding:4px;user-select:none;}
.slot{font-family:'Oswald',sans-serif;color:var(--dim);font-size:13px;min-width:22px;text-align:right;}
.card-main{flex:1;min-width:0;}
.card-title{font-size:14.5px;font-weight:600;}
.card-meta{display:flex;gap:8px;align-items:center;margin-top:3px;flex-wrap:wrap;}
.pill{font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;padding:2px 7px;border-radius:20px;border:1px solid var(--border);color:var(--dim);}
.pill.team{border-color:var(--gold);color:var(--gold);}
.pill.spotlight{border-color:var(--spot);color:var(--spot);}
.time{font-size:12.5px;color:var(--dim);font-family:ui-monospace,monospace;white-space:nowrap;}
.dur{font-size:13px;color:var(--text);font-family:ui-monospace,monospace;white-space:nowrap;}
.warn-line{font-size:12px;color:var(--warn);margin-top:5px;}
.interval-input{width:64px;background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 7px;font-size:13px;text-align:center;}
.drop-placeholder{height:3px;background:var(--gold);border-radius:2px;margin:2px 0;}
.empty{padding:34px 14px;text-align:center;color:var(--dim);font-size:14px;}
.actions{display:flex;gap:10px;margin-top:18px;}
#printTable{display:none;}
@media print{
  body *{visibility:hidden;}
  #printTable, #printTable *{visibility:visible;}
  #printTable{display:block;position:absolute;left:0;top:0;width:100%;color:#000;}
  #printTable table{width:100%;border-collapse:collapse;font-family:Arial,sans-serif;}
  #printTable th,#printTable td{border:1px solid #999;padding:6px 8px;font-size:12px;text-align:left;}
  #printTable h2{font-family:Arial,sans-serif;}
}
@media (max-width:480px){
  h1{font-size:22px;}
  .totals .big{font-size:21px;}
  .card{padding:9px 10px;gap:8px;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Shine on Stage</div>
  <h1>Running order builder</h1>

  <div class="panel">
    <div class="row">
      <div>
        <label for="showName">Show name</label>
        <input type="text" id="showName" placeholder="e.g. Albany Theatre - Summer Showcase">
      </div>
    </div>
    <div class="row" style="margin-top:12px;">
      <div>
        <label class="toggle"><input type="checkbox" id="hasInterval"> Has an interval</label>
      </div>
      <div>
        <label for="intervalMin">Interval length (minutes)</label>
        <input type="number" id="intervalMin" value="15" min="1" max="60">
      </div>
      <div>
        <label for="minChangeMin">Minimum change time (minutes)</label>
        <input type="number" id="minChangeMin" value="5" min="1" max="20">
      </div>
    </div>
    <div class="totals" id="totalsBlock" style="display:none;"></div>
  </div>

  <div class="panel" id="dataPanel">
    <label for="pasteArea">Paste your routines from the Routines tab (with or without the header row)</label>
    <textarea id="pasteArea" placeholder="Copy the rows from your Google Sheet and paste here..."></textarea>
    <div class="actions">
      <button id="loadPasteBtn">Build running order</button>
      <button class="ghost" id="loadSampleBtn">Try it with sample data</button>
    </div>
  </div>

  <div class="muted" id="dataSummary" style="display:none;margin-bottom:14px;">
    <span id="dataSummaryText"></span> &nbsp;·&nbsp;
    <button class="linklike" id="loadDifferentBtn">Load different data</button> &nbsp;·&nbsp;
    <button class="linklike" id="rearrangeBtn">Re-run auto-arrange</button>
  </div>

  <div class="issues" id="issuesPanel" style="display:none;">
    <h3>Worth checking</h3>
    <ul id="issuesList"></ul>
  </div>

  <div id="orderList"></div>

  <div class="actions" id="exportActions" style="display:none;">
    <button class="ghost" id="printBtn">Print running order</button>
    <button class="ghost" id="csvBtn">Download CSV</button>
  </div>

  <div id="printTable"></div>
</div>

<script>
/* ---------- parsing ---------- */
function detectDelimiter(line){
  const tabs=(line.match(/\t/g)||[]).length, commas=(line.match(/,/g)||[]).length;
  return tabs>=commas?"\t":",";
}
function parseDelimited(text){
  const lines=text.replace(/\r\n/g,"\n").split("\n").filter(l=>l.trim()!=="");
  if(!lines.length) return [];
  const delim=detectDelimiter(lines[0]);
  return lines.map(line=>{
    if(delim==="\t") return line.split("\t").map(c=>c.trim());
    const out=[]; let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(inQ){
        if(ch==='"'&&line[i+1]==='"'){cur+='"';i++;}
        else if(ch==='"') inQ=false;
        else cur+=ch;
      } else {
        if(ch==='"') inQ=true;
        else if(ch===","){out.push(cur.trim());cur="";}
        else cur+=ch;
      }
    }
    out.push(cur.trim());
    return out;
  });
}
function parseDuration(str){
  if(!str) return null;
  const m=String(str).trim().match(/^(\d+):([0-5]\d)$/);
  if(!m) return null;
  return parseInt(m[1],10)*60+parseInt(m[2],10);
}
function formatMMSS(t){const s=Math.max(0,Math.round(t));const m=Math.floor(s/60),sec=s%60;return m+":"+String(sec).padStart(2,"0");}
function formatLong(t){const s=Math.max(0,Math.round(t));const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?(h+"h "+String(m).padStart(2,"0")+"m"):(m+"m");}
function formatClock(t){const s=Math.max(0,Math.round(t));const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");}

const COLS=["school","routine","type","sharesYesNo","fixedPosition","exactSlot","durationRaw","gapAfterRaw","gapType","notes"];
function rowsToRoutines(rows){
  let r=rows;
  if(r.length && String(r[0][0]||"").trim().toLowerCase()==="school") r=r.slice(1);
  const issues=[];
  const routines=r.filter(row=>row.some(c=>c!=="")).map((row,idx)=>{
    const obj={id:"r"+idx+"_"+Math.random().toString(36).slice(2,7)};
    COLS.forEach((key,i)=>obj[key]=(row[i]||"").trim());
    obj.durationSec=parseDuration(obj.durationRaw);
    obj.gapAfterSec=obj.gapAfterRaw?(parseDuration(obj.gapAfterRaw)||0):0;
    if(!obj.school && obj.type!=="Closing segment") issues.push(`Row ${idx+1}: missing school`);
    if(!obj.type) issues.push(`"${obj.routine||"(untitled)"}": missing type`);
    if(obj.durationSec===null) issues.push(`"${obj.routine||"(untitled)"}": duration "${obj.durationRaw}" isn't valid M:SS`);
    if(obj.fixedPosition==="Exact position" && !obj.exactSlot) issues.push(`"${obj.routine}": Exact position needs a slot number`);
    return obj;
  });
  const teamCounts={};
  routines.forEach(rt=>{if(rt.type==="Team") teamCounts[rt.school]=(teamCounts[rt.school]||0)+1;});
  routines.forEach(rt=>{
    if(rt.type==="Team" && teamCounts[rt.school]>=2 && rt.sharesYesNo!=="Yes" && rt.sharesYesNo!=="No"){
      issues.push(`"${rt.routine}" (${rt.school}): needs Yes/No for "shares dancers with other Team routines" - assuming Yes for now`);
      rt.sharesYesNo="Yes";
    }
  });
  return {routines,issues};
}

/* ---------- overlap rule ---------- */
function sharesPerformers(a,b){
  if(a.school!==b.school) return false;
  if(a.type==="Closing segment"||b.type==="Closing segment") return false;
  if(a.type==="Spotlight"&&b.type==="Spotlight") return false;
  if(a.type==="Team"&&b.type==="Team") return a.sharesYesNo!=="No";
  return true;
}

/* ---------- timeline / warnings ---------- */
function getId(item){return item.kind==="interval"?"interval":item.id;}
function computeTimeline(order,startAt){
  let t=startAt||0;
  return order.map(item=>{
    const dur=item.kind==="interval"?item.durationSec:(item.durationSec||0);
    const gap=item.kind==="interval"?0:(item.gapAfterSec||0);
    const startSec=t,endSec=t+dur;
    t=endSec+gap;
    return {item,startSec,endSec,nextStartSec:t};
  });
}
function routineSequenceNumbers(order){
  const map={};let n=0;
  order.forEach(item=>{
    if(item.kind==="interval"||item.type==="Closing segment") return;
    n+=1;map[item.id]=n;
  });
  return map;
}
function countRoutineSlots(order){return order.filter(i=>i.kind!=="interval"&&i.type!=="Closing segment").length;}
function computeWarnings(order,minChangeSec){
  const timeline=computeTimeline(order);
  const seqNum=routineSequenceNumbers(order);
  const totalSlots=countRoutineSlots(order);
  const byId={};
  timeline.forEach(t=>{if(t.item.kind!=="interval") byId[t.item.id]=t;});
  const warnings={};
  const add=(id,msg)=>{(warnings[id]=warnings[id]||[]).push(msg);};
  const routines=order.filter(o=>o.kind!=="interval");
  for(let i=0;i<routines.length;i++){
    for(let j=i+1;j<routines.length;j++){
      const a=routines[i],b=routines[j];
      if(!sharesPerformers(a,b)) continue;
      const ta=byId[a.id],tb=byId[b.id];
      const gap=ta.startSec<=tb.startSec?tb.startSec-ta.endSec:ta.startSec-tb.endSec;
      if(gap<minChangeSec){
        const [earlier,later]=ta.startSec<=tb.startSec?[a,b]:[b,a];
        add(later.id,`Only ${formatMMSS(Math.max(0,gap))} after "${earlier.routine}" - same dancers, needs ~${formatMMSS(minChangeSec)}`);
      }
    }
  }
  routines.forEach((r,idx)=>{
    if(r.fixedPosition==="Opens the show" && idx!==0) add(r.id,"Flagged to open the show, but isn't first");
    if(r.fixedPosition==="Closes the show" && seqNum[r.id]!==totalSlots) add(r.id,"Flagged to close the show, but isn't the last routine");
    if(r.fixedPosition==="Exact position" && r.exactSlot && seqNum[r.id]!==parseInt(r.exactSlot,10)) add(r.id,`Flagged for position ${r.exactSlot}, currently at ${seqNum[r.id]}`);
  });
  const intervalIdx=order.findIndex(o=>o.kind==="interval");
  routines.forEach(r=>{
    const idx=order.indexOf(r);
    if(r.fixedPosition==="Goes right before the interval" && (intervalIdx===-1||idx!==intervalIdx-1)) add(r.id,"Flagged to go right before the interval, but isn't adjacent to it");
    if(r.fixedPosition==="Goes right after the interval" && (intervalIdx===-1||idx!==intervalIdx+1)) add(r.id,"Flagged to go right after the interval, but isn't adjacent to it");
  });
  return {warnings,timeline,seqNum};
}
function violationPenalty(order,minChangeSec){
  return Object.values(computeWarnings(order,minChangeSec).warnings).reduce((s,a)=>s+a.length,0);
}
function mulberry32(seed){
  return function(){seed|=0;seed=(seed+0x6D2B79F5)|0;let t=Math.imul(seed^(seed>>>15),1|seed);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};
}
function autoArrange(routines,settings){
  const closing=routines.filter(r=>r.type==="Closing segment");
  let active=routines.filter(r=>r.type!=="Closing segment");
  const bySchool={};
  active.forEach(r=>(bySchool[r.school]=bySchool[r.school]||[]).push(r));
  const keys=Object.keys(bySchool);
  let interleaved=[],i=0;
  while(interleaved.length<active.length){
    const k=keys[i%keys.length];
    if(bySchool[k].length) interleaved.push(bySchool[k].shift());
    i++;
  }
  active=interleaved;
  const openItem=active.find(r=>r.fixedPosition==="Opens the show");
  const closeItem=active.find(r=>r.fixedPosition==="Closes the show");
  active=active.filter(r=>r!==openItem&&r!==closeItem);
  let best=active.slice();
  const withEnds=arr=>[openItem,...arr,closeItem].filter(Boolean);
  let bestPenalty=violationPenalty(withEnds(best),settings.minChangeSec);
  let rng=mulberry32(42);
  for(let iter=0;iter<3000&&bestPenalty>0;iter++){
    const a=Math.floor(rng()*best.length),b=Math.floor(rng()*best.length);
    if(a===b) continue;
    const cand=best.slice();[cand[a],cand[b]]=[cand[b],cand[a]];
    const p=violationPenalty(withEnds(cand),settings.minChangeSec);
    if(p<=bestPenalty){best=cand;bestPenalty=p;}
  }
  let order=withEnds(best);
  if(settings.hasInterval){
    const beforeItem=order.find(r=>r.fixedPosition==="Goes right before the interval");
    const afterItem=order.find(r=>r.fixedPosition==="Goes right after the interval");
    const intervalObj={kind:"interval",durationSec:settings.intervalSec};
    if(beforeItem) order.splice(order.indexOf(beforeItem)+1,0,intervalObj);
    else if(afterItem) order.splice(order.indexOf(afterItem),0,intervalObj);
    else{
      let cum=0,half=order.reduce((s,r)=>s+r.durationSec+r.gapAfterSec,0)/2,insertAt=order.length;
      for(let k=0;k<order.length;k++){cum+=order[k].durationSec+order[k].gapAfterSec;if(cum>=half){insertAt=k+1;break;}}
      order.splice(insertAt,0,intervalObj);
    }
    if(beforeItem&&afterItem){
      const idx=order.indexOf(intervalObj);
      if(order[idx+1]!==afterItem){
        order.splice(order.indexOf(afterItem),1);
        order.splice(order.indexOf(intervalObj)+1,0,afterItem);
      }
    }
    const pinned=new Set([openItem,closeItem,beforeItem,afterItem].filter(Boolean).map(r=>r.id));
    const movable=[];
    order.forEach((it,idx)=>{if(it.kind!=="interval"&&!pinned.has(it.id)) movable.push(idx);});
    let refined=order.slice(),refPenalty=violationPenalty(refined,settings.minChangeSec);
    for(let iter=0;iter<3000&&refPenalty>0&&movable.length>1;iter++){
      const a=movable[Math.floor(rng()*movable.length)],b=movable[Math.floor(rng()*movable.length)];
      if(a===b) continue;
      const cand=refined.slice();[cand[a],cand[b]]=[cand[b],cand[a]];
      const p=violationPenalty(cand,settings.minChangeSec);
      if(p<=refPenalty){refined=cand;refPenalty=p;}
    }
    order=refined;
  }
  return [...order,...closing];
}

/* ---------- state & UI ---------- */
const state={routines:[],order:[],issues:[]};
const $=id=>document.getElementById(id);

function settings(){
  return {
    hasInterval:$("hasInterval").checked,
    intervalSec:Math.max(1,parseInt($("intervalMin").value||"15",10))*60,
    minChangeSec:Math.max(1,parseInt($("minChangeMin").value||"5",10))*60,
  };
}

function loadRoutines(rows){
  const {routines,issues}=rowsToRoutines(rows);
  state.routines=routines;
  state.issues=issues;
  if(routines.length){
    state.order=autoArrange(routines,settings());
  } else {
    state.order=[];
  }
  $("dataPanel").style.display="none";
  $("dataSummary").style.display="block";
  $("dataSummaryText").textContent=routines.length+" routine"+(routines.length===1?"":"s")+" loaded";
  render();
}

function applyIntervalChange(){
  const s=settings();
  const idx=state.order.findIndex(o=>o.kind==="interval");
  if(s.hasInterval && idx===-1){
    let cum=0,half=state.order.reduce((sum,r)=>sum+(r.durationSec||0)+(r.gapAfterSec||0),0)/2,insertAt=state.order.length;
    for(let k=0;k<state.order.length;k++){cum+=(state.order[k].durationSec||0)+(state.order[k].gapAfterSec||0);if(cum>=half){insertAt=k+1;break;}}
    state.order.splice(insertAt,0,{kind:"interval",durationSec:s.intervalSec});
  } else if(!s.hasInterval && idx!==-1){
    state.order.splice(idx,1);
  } else if(idx!==-1){
    state.order[idx].durationSec=s.intervalSec;
  }
  render();
}

function render(){
  const s=settings();
  const hasData=state.routines.length>0;
  $("orderList").innerHTML="";
  if(!hasData){
    $("orderList").innerHTML='<div class="empty">No routines loaded yet - paste your sheet data above to get started.</div>';
    $("totalsBlock").style.display="none";
    $("issuesPanel").style.display="none";
    $("exportActions").style.display="none";
    return;
  }
  const {warnings,timeline,seqNum}=computeWarnings(state.order,s.minChangeSec);
  const totalSlots=countRoutineSlots(state.order);

  // issues
  if(state.issues.length){
    $("issuesPanel").style.display="block";
    $("issuesList").innerHTML=state.issues.map(m=>"<li>"+escapeHtml(m)+"</li>").join("");
  } else {
    $("issuesPanel").style.display="none";
  }

  // totals
  const last=timeline[timeline.length-1];
  const totalSec=last?last.nextStartSec:0;
  let actSplit="";
  const ivIdx=state.order.findIndex(o=>o.kind==="interval");
  if(ivIdx!==-1){
    const act1End=timeline[ivIdx-1]?timeline[ivIdx-1].nextStartSec:0;
    const act2Start=timeline[ivIdx].nextStartSec;
    const act2Dur=totalSec-act2Start;
    actSplit=`<div><div class="big" style="font-size:16px;">${formatLong(act1End)}</div><div class="sub">Act 1</div></div>`+
             `<div><div class="big" style="font-size:16px;color:var(--interval);">${formatLong(s.intervalSec)}</div><div class="sub">Interval</div></div>`+
             `<div><div class="big" style="font-size:16px;">${formatLong(act2Dur)}</div><div class="sub">Act 2</div></div>`;
  }
  $("totalsBlock").style.display="flex";
  $("totalsBlock").innerHTML=`<div><div class="big">${formatLong(totalSec)}</div><div class="sub">Total show length</div></div>`+actSplit;

  // cards
  const ordEl=$("orderList");
  state.order.forEach(item=>{
    const t=timeline.find(x=>x.item===item);
    const id=getId(item);
    const card=document.createElement("div");
    card.className="card"+(item.kind==="interval"?" interval":(item.type==="Closing segment"?" closing":""));
    card.setAttribute("data-id",id);
    if(item.kind==="interval"){
      card.innerHTML=`
        <span class="drag-handle">⠿⠿</span>
        <span class="slot">—</span>
        <div class="card-main">
          <div class="card-title">Interval</div>
          <div class="card-meta"><span class="time">${formatClock(t.startSec)}</span></div>
        </div>
        <input class="interval-input" type="number" min="1" max="60" value="${Math.round(item.durationSec/60)}" data-interval-min>
        <span class="muted">min</span>`;
    } else {
      const seq=item.type==="Closing segment"?"":seqNum[item.id];
      const warnArr=warnings[item.id]||[];
      card.innerHTML=`
        <span class="drag-handle">⠿⠿</span>
        <span class="slot">${seq}</span>
        <div class="card-main">
          <div class="card-title">${escapeHtml(item.routine)}</div>
          <div class="card-meta">
            <span class="pill ${item.type==="Team"?"team":(item.type==="Spotlight"?"spotlight":"")}">${escapeHtml(item.type||"?")}</span>
            <span class="muted">${escapeHtml(item.school)}</span>
            <span class="time">${formatClock(t.startSec)}</span>
          </div>
          ${warnArr.map(w=>'<div class="warn-line">⚠ '+escapeHtml(w)+'</div>').join("")}
        </div>
        <span class="dur">${formatMMSS(item.durationSec)}</span>`;
    }
    ordEl.appendChild(card);
  });

  // wire interval duration input
  const ivInput=ordEl.querySelector("[data-interval-min]");
  if(ivInput){
    ivInput.addEventListener("change",()=>{
      const idx=state.order.findIndex(o=>o.kind==="interval");
      if(idx!==-1){
        state.order[idx].durationSec=Math.max(1,parseInt(ivInput.value||"1",10))*60;
        $("intervalMin").value=Math.round(state.order[idx].durationSec/60);
        render();
      }
    });
  }

  wireDragHandles();
  $("exportActions").style.display="flex";
}

function escapeHtml(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

/* ---------- drag and drop ---------- */
function wireDragHandles(){
  document.querySelectorAll(".drag-handle").forEach(handle=>{
    handle.onpointerdown=function(e){
      e.preventDefault();
      const card=handle.closest(".card");
      const id=card.getAttribute("data-id");
      const listEl=$("orderList");
      const startIndex=state.order.findIndex(o=>getId(o)===id);
      card.classList.add("dragging");
      const placeholder=document.createElement("div");
      placeholder.className="drop-placeholder";
      listEl.insertBefore(placeholder,card.nextSibling);

      function onMove(ev){
        const others=Array.from(listEl.querySelectorAll(".card:not(.dragging)"));
        let target=null;
        for(const c of others){
          const r=c.getBoundingClientRect();
          if(ev.clientY<r.top+r.height/2){target=c;break;}
        }
        if(target) listEl.insertBefore(placeholder,target);
        else listEl.appendChild(placeholder);
      }
      function onUp(){
        document.removeEventListener("pointermove",onMove);
        document.removeEventListener("pointerup",onUp);
        document.removeEventListener("pointercancel",onUp);
        const siblings=Array.from(listEl.children).filter(c=>c!==card);
        const newIndex=siblings.indexOf(placeholder);
        placeholder.remove();
        card.classList.remove("dragging");
        const [moved]=state.order.splice(startIndex,1);
        state.order.splice(newIndex,0,moved);
        render();
      }
      document.addEventListener("pointermove",onMove);
      document.addEventListener("pointerup",onUp);
      document.addEventListener("pointercancel",onUp);
    };
  });
}

/* ---------- export ---------- */
function preparePrint(){
  const s=settings();
  const timeline=computeTimeline(state.order);
  const showName=$("showName").value||"Running order";
  let rows=state.order.map((item,idx)=>{
    const t=timeline[idx];
    if(item.kind==="interval") return `<tr><td colspan="2"><em>Interval</em></td><td></td><td>${formatClock(t.startSec)}</td><td>${formatMMSS(item.durationSec)}</td></tr>`;
    const seq=item.type==="Closing segment"?"":routineSequenceNumbers(state.order)[item.id];
    return `<tr><td>${seq}</td><td>${escapeHtml(item.school)}</td><td>${escapeHtml(item.routine)}</td><td>${formatClock(t.startSec)}</td><td>${formatMMSS(item.durationSec)}</td></tr>`;
  }).join("");
  $("printTable").innerHTML=`<h2>${escapeHtml(showName)}</h2>
    <table><thead><tr><th>#</th><th>School</th><th>Routine</th><th>Start</th><th>Duration</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

function downloadCsv(){
  const timeline=computeTimeline(state.order);
  const seq=routineSequenceNumbers(state.order);
  const lines=[["Slot","School","Routine","Type","Start","Duration"].join(",")];
  state.order.forEach((item,idx)=>{
    const t=timeline[idx];
    if(item.kind==="interval"){
      lines.push(["","","Interval","Interval",formatClock(t.startSec),formatMMSS(item.durationSec)].map(csvCell).join(","));
    } else {
      lines.push([item.type==="Closing segment"?"":seq[item.id],item.school,item.routine,item.type,formatClock(t.startSec),formatMMSS(item.durationSec)].map(csvCell).join(","));
    }
  });
  const blob=new Blob([lines.join("\n")],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=(($("showName").value||"running-order").replace(/[^a-z0-9\- ]/gi,"").trim()||"running-order")+".csv";
  a.click();
}
function csvCell(v){v=String(v==null?"":v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
